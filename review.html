<script>
  const images = Array.from(document.querySelectorAll('.review-img-box img'));
  const modal = document.getElementById('img-modal');
  const modalImg = document.getElementById('img-modal-img');
  const closeBtn = document.getElementById('img-modal-close');
  const prevBtn = document.getElementById('img-prev');
  const nextBtn = document.getElementById('img-next');

  let currentIndex = 0;

  // 화살표 표시 상태 업데이트
  function updateArrows() {
    // 첫 번째 이미지에서는 왼쪽 화살표 숨김
    if (currentIndex === 0) {
      prevBtn.style.display = "none";
    } else {
      prevBtn.style.display = "block";
    }

    // 마지막 이미지에서는 오른쪽 화살표 숨김
    if (currentIndex === images.length - 1) {
      nextBtn.style.display = "none";
    } else {
      nextBtn.style.display = "block";
    }
  }

  // 이미지 클릭 시 모달 열기
  images.forEach((img, index) => {
    img.addEventListener('click', () => {
      currentIndex = index;
      modalImg.src = img.src;
      modal.style.display = "flex";
      updateArrows();
    });
  });

  // 닫기 버튼
  closeBtn.addEventListener('click', () => {
    modal.style.display = "none";
    modalImg.src = '';
  });

  // 배경 클릭 시 닫기
  modal.addEventListener('click', (e) => {
    if (e.target === modal) {
      modal.style.display = "none";
      modalImg.src = '';
    }
  });

  // 이전 화살표
  prevBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (currentIndex > 0) {
      currentIndex--;
      modalImg.src = images[currentIndex].src;
      updateArrows();
    }
  });

  // 다음 화살표
  nextBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (currentIndex < images.length - 1) {
      currentIndex++;
      modalImg.src = images[currentIndex].src;
      updateArrows();
    }
  });

  // 키보드 방향키도 지원 (← → 닫기 ESC)
  document.addEventListener('keydown', (e) => {
    if (modal.style.display === "flex") {
      if (e.key === "ArrowLeft" && currentIndex > 0) {
        currentIndex--;
        modalImg.src = images[currentIndex].src;
        updateArrows();
      } else if (e.key === "ArrowRight" && currentIndex < images.length - 1) {
        currentIndex++;
        modalImg.src = images[currentIndex].src;
        updateArrows();
      } else if (e.key === "Escape") {
        modal.style.display = "none";
        modalImg.src = '';
      }
    }
  });
</script>
